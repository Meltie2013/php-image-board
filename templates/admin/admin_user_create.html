{include file="global/header.html"}

    <main class="gallery-container-view">
        <div class="gallery-item-view admin-layout">
            <div class="gallery-left-side">
                <div class="gallery-details-view admin-menu">
                    {include file="admin/admin_menu.html"}
                </div>
            </div>

            <div class="gallery-image-wrapper admin-dashboard">
                <h2>Create User</h2>

                {if !empty($success)}
                    <p class="success">{$success}</p>
                {/if}

                {if !empty($error)}
                    <div class="error-box">
                        {foreach $error as $e}
                            <p>{$e}</p>
                        {/foreach}
                    </div>
                {/if}

                <form method="POST" action="/admin/users/create">
                    <input type="hidden" name="csrf_token" value="{$csrf_token}">

                    <label>Username</label>
                    <input type="text" name="username" required>

                    <label>Display Name</label>
                    <input type="text" name="display_name">

                    <label>Email</label>
                    <input type="email" name="email" required>

                    <label>Password</label>
                    <input type="password" name="password" required>

                    <label>Role</label>
                    <select name="role_id">
                        {foreach $roles as list($r_id, $r_name)}
                            <option value="{$r_id}">{$r_name}</option>
                        {/foreach}
                    </select>

                    <label>Status</label>
                    <select name="status">
                        <option value="active">active</option>
                        <option value="pending">pending</option>
                        <option value="suspended">suspended</option>
                    </select>

                    <button type="submit">Create</button>
                </form>
            </div>
        </div>
    </main>

{include file="global/footer.html"}
