<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{$site_name}</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/default/gallery.css">
    <link rel="stylesheet" href="/assets/css/default/profile.css">
    <link rel="stylesheet" href="/assets/css/default/control-panel.css">
</head>
<body>
    <header>
        <div class="logo">{$site_name}</div>

        <nav>
            <a class="nav-icon" href="#" aria-label="Community Forum" data-tooltip="Community Forum">
                <i class="fa-regular fa-comments"></i>
            </a>

            <a class="nav-icon" href="/gallery" aria-label="Image Gallery" data-tooltip="Image Gallery">
                <i class="fa-regular fa-image"></i>
            </a>

            {if $is_logged_in}
            {if $site_user_role == 'Administrator'}
            <a class="nav-icon" href="/panel/dashboard" aria-label="Control Panel" data-tooltip="Control Panel">
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </a>
            {else if $site_user_role == 'Moderator'}
            <a class="nav-icon" href="/panel/dashboard" aria-label="Control Panel" data-tooltip="Control Panel">
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </a>
            {/if}

            <a class="nav-icon" href="#" aria-label="Notifications" data-tooltip="Notifications">
                <i class="fa-regular fa-bell"></i>
            </a>

            <a class="nav-icon" href="/profile/overview" aria-label="My Profile" data-tooltip="My Profile">
                <i class="fa-regular fa-user"></i>
            </a>

            <form action="/user/logout" method="post" style="display: inline; margin: 0; padding: 0;">
                <input type="hidden" name="csrf_token" value="{$csrf_token}">
                <input type="hidden" name="return_to" value="{$current_request_uri}">
                <button class="nav-icon" type="submit" aria-label="Logout" data-tooltip="Logout" style="background: none; border: 0; padding: 0; cursor: pointer;">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </form>
            {else}
            <a class="nav-icon" href="/user/login?return_to={$current_request_uri}" aria-label="Login" data-tooltip="Login">
                <i class="fa-solid fa-right-to-bracket"></i>
            </a>

            <a class="nav-icon" href="/user/register" aria-label="Register" data-tooltip="Register">
                <i class="fa-solid fa-user-plus"></i>
            </a>
            {/if}
        </nav>
    </header>
