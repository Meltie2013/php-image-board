{include file="global/header.html"}

    <main class="gallery-container-view">
        <div class="gallery-item-view admin-layout">
            <div class="gallery-left-side">
                <div class="gallery-details-view admin-menu">
                    {include file="admin/admin_menu.html"}
                </div>
            </div>

            <div class="gallery-image-wrapper admin-dashboard">
                <h2>App Settings</h2>

                <div class="dashboard-content-wrapper" style="margin-bottom: 16px;">
                    <div class="dashboard-cards-wrapper">
                        <div class="dashboard-label">Settings</div>
                
                        <div class="pending-images-wrapper">
                            <table class="pending-images-table">
                                <thead>
                                    <tr>
                                        <th>Key</th>
                                        <th>Updated</th>
                                        <th>Edit</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {foreach $settings as list($s_key_disp, $s_updated_at, $s_key_attr, $s_value_attr, $s_type)}
                                    <tr>
                                        <td>{$s_key_disp}</td>
                                        <td>{$s_updated_at}</td>
                                        <td class="admin-cell-edit">
                                            <form method="POST" action="/admin/settings/save" class="admin-settings-editor">
                                                <input type="hidden" name="csrf_token" value="{$csrf_token}">
                                                <input type="hidden" name="key" value="{$s_key_attr}">
                                                <input type="text" name="value" value="{$s_value_attr}" class="admin-input" aria-label="Value">
                                                <select name="type" class="admin-select" aria-label="Type">
                                                    <option value="string" {if $s_type == 'string'}selected{/if}>string</option>
                                                    <option value="int" {if $s_type == 'int'}selected{/if}>int</option>
                                                    <option value="bool" {if $s_type == 'bool'}selected{/if}>bool</option>
                                                    <option value="json" {if $s_type == 'json'}selected{/if}>json</option>
                                                </select>
                                                <button type="submit" class="admin-btn admin-btn-primary">Save</button>
                                            </form>
                                        </td>
                                    </tr>
                                    {/foreach}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="dashboard-content-wrapper">
                    <div class="dashboard-cards-wrapper">
                        <div class="dashboard-label">Add Setting</div>

                        <div class="admin-box">
                            <form method="POST" action="/admin/settings/save" class="admin-form-grid admin-form-grid-settings-add">
                                <input type="hidden" name="csrf_token" value="{$csrf_token}">
                                <input type="text" name="key" placeholder="key" class="admin-input" required>
                                <input type="text" name="value" placeholder="value" class="admin-input" required>
                                <select name="type" class="admin-select">
                                    <option value="string">string</option>
                                    <option value="int">int</option>
                                    <option value="bool">bool</option>
                                    <option value="json">json</option>
                                </select>
                                <button type="submit" class="admin-btn admin-btn-primary">Add</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

{include file="global/footer.html"}
